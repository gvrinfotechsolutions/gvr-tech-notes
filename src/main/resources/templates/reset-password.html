<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-dark: #0e7a5f; --primary-light: #e6f7f2;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --danger: #ef4444; --danger-light: #fef2f2;
            --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
            --radius: 16px; --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); width: 100%; max-width: 460px; padding: 44px 40px; }
        .brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
        .brand-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .brand-name { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
        .alert-box { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: var(--danger-light); color: #b91c1c; border: 1px solid #fecaca; }
        .alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-wrap input { width: 100%; padding: 11px 14px 11px 40px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; }
        .input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }
        .eye-toggle { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; cursor: pointer; border: none; background: none; padding: 0; }
        .eye-toggle:hover { color: var(--primary); }
        .strength-bar { height: 4px; border-radius: 4px; background: #e5e9ef; margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0; }
        .strength-label { font-size: 11px; font-weight: 600; margin-top: 4px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .footer-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .card { padding: 32px 22px; } }
    </style>
</head>
<body>
    <div class="card">

        <div class="brand">
            <div class="brand-icon"><i class="bi bi-journal-richtext"></i></div>
            <div class="brand-name">GVR_T_Notes</div>
        </div>

        <h2>Set New Password</h2>
        <p class="subtitle">Choose a strong password for your account</p>

        <!-- invalid / expired token -->
        <div th:if="${!tokenValid}" class="alert-box alert-warning">
            <i class="bi bi-exclamation-triangle-fill"></i>
            This reset link is invalid or has expired.
            <a th:href="@{/forgot-password}" style="margin-left:4px; color:inherit; font-weight:700;">Request a new one</a>.
        </div>

        <!-- validation error from POST -->
        <div th:if="${error}" class="alert-box alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:if="${tokenValid}" th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="newPassword" name="newPassword"
                           placeholder="Min. 8 chars, uppercase, digit, symbol"
                           autocomplete="new-password" oninput="checkStrength(this.value)" required autofocus>
                    <button type="button" class="eye-toggle" onclick="togglePwd('newPassword','eyeIcon1')">
                        <i class="bi bi-eye" id="eyeIcon1"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <div class="strength-label" id="strengthLabel" style="color:var(--text-muted)"></div>
            </div>

            <div class="form-group">
                <label for="confirmNewPassword">Confirm New Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword"
                           placeholder="Re-enter your new password"
                           autocomplete="new-password" required>
                    <button type="button" class="eye-toggle" onclick="togglePwd('confirmNewPassword','eyeIcon2')">
                        <i class="bi bi-eye" id="eyeIcon2"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="bi bi-shield-check"></i> Reset Password
            </button>
        </form>

        <div class="footer-link">
            <a th:href="@{/login}">Back to sign in</a>
        </div>
    </div>

    <script>
        function togglePwd(fieldId, iconId) {
            const p = document.getElementById(fieldId);
            const i = document.getElementById(iconId);
            p.type = p.type === 'password' ? 'text' : 'password';
            i.className = p.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
        }

        function checkStrength(v) {
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            if (!fill) return;
            let score = 0;
            if (v.length >= 8)  score++;
            if (/[A-Z]/.test(v)) score++;
            if (/[0-9]/.test(v)) score++;
            if (/[^A-Za-z0-9]/.test(v)) score++;
            const levels = [
                { pct: '0%',   color: '#e5e9ef', text: '' },
                { pct: '30%',  color: '#ef4444', text: 'Weak' },
                { pct: '55%',  color: '#f59e0b', text: 'Fair' },
                { pct: '80%',  color: '#3b82f6', text: 'Good' },
                { pct: '100%', color: '#16a37f', text: 'Strong' },
            ];
            const l = levels[score];
            fill.style.width = l.pct;
            fill.style.background = l.color;
            label.textContent = l.text;
            label.style.color = l.color;
        }
    </script>
</body>
</html>
