<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f6f9; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); max-width: 480px; width: 100%; padding: 48px 40px; text-align: center; }
        .icon-wrap { width: 72px; height: 72px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .icon-wrap i { font-size: 32px; color: #ef4444; }
        h1 { font-size: 24px; font-weight: 800; color: #1e2330; margin-bottom: 12px; }
        .msg { font-size: 15px; color: #6b7280; line-height: 1.7; margin-bottom: 32px; }
        .msg strong { color: #1e2330; }
        .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; text-decoration: none; cursor: pointer; border: none; transition: all 0.15s; }
        .btn-primary { background: #16a37f; color: #fff; }
        .btn-primary:hover { background: #0e7a5f; }
        .btn-secondary { background: #f4f6f9; color: #374151; border: 1.5px solid #e5e9ef; }
        .btn-secondary:hover { background: #e5e9ef; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h1>Something went wrong</h1>
        <p class="msg" th:if="${errorMessage}">
            <strong th:text="${errorMessage}"></strong>
        </p>
        <p class="msg" th:unless="${errorMessage}">
            An unexpected error occurred. Please try again or go back to the home page.
        </p>
        <div class="actions">
            <a href="/" class="btn btn-primary"><i class="bi bi-house"></i> Go Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Go Back</a>
        </div>
    </div>
</body>
</html>
