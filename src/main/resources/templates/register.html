<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>User Registration - GVR_T_Notes</title>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- BOOTSTRAP -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		body {

			background: linear-gradient(to right,
					#f8fafc,
					#e2e8f0);

			font-family: Arial, sans-serif;

			min-height: 100vh;
		}

		.register-container {

			max-width: 450px;

			margin: 60px auto;

			background: white;

			padding: 40px;

			border-radius: 20px;

			box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
		}

		.page-title {

			text-align: center;

			color: #2d9d78;

			font-weight: 700;

			margin-bottom: 30px;
		}

		.form-label {

			font-weight: 600;

			color: #444;
		}

		.form-control {

			border-radius: 10px;

			padding: 12px;
		}

		.btn-register {

			width: 100%;

			padding: 12px;

			border-radius: 10px;

			font-weight: 600;

			font-size: 16px;
		}

		.login-link {

			text-align: center;

			margin-top: 20px;
		}

		.login-link a {

			text-decoration: none;

			color: #2d9d78;

			font-weight: 600;
		}

		.login-link a:hover {

			text-decoration: underline;
		}
	</style>

</head>

<body>

	<!-- LEARNING BANNER -->

	<div th:replace="fragments/banner :: learningBanner"></div>

	<div class="container">

		<div class="register-container">

			<h2 class="page-title">

				Create Your Account

			</h2>

			<form th:action="@{/register}" th:object="${registerRequest}" method="post">

				<!-- USERNAME -->

				<div class="mb-3">

					<label class="form-label">

						Username

					</label>

					<input type="text" th:field="*{username}" class="form-control" placeholder="Enter username"
						required>

				</div>

				<!-- PASSWORD -->

				<div class="mb-4">

					<label class="form-label">

						Password

					</label>

					<input type="password" th:field="*{password}" class="form-control" placeholder="Enter password"
						required>

				</div>

				<!-- BUTTON -->

				<button type="submit" class="btn btn-success btn-register">

					Request Access

				</button>

			</form>

			<!-- LOGIN LINK -->

			<div class="login-link">

				Already have an account?

				<a href="/login">

					Login

				</a>

			</div>

		</div>

	</div>

</body>

</html>
