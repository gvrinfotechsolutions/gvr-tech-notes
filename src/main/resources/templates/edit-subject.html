<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Subject — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-light: #e6f7f2; --primary-dark: #0e7a5f;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .topbar-logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .topbar-nav { display: flex; align-items: center; gap: 4px; }
        .topbar-nav a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
        .topbar-nav a:hover { background: var(--primary-light); color: var(--primary); }
        .btn-logout { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid #fca5a5; color: #ef4444; background: #fff5f5; cursor: pointer; transition: all 0.15s; }
        .btn-logout:hover { background: #fee2e2; }

        .page-wrap { max-width: 620px; margin: 36px auto; padding: 0 20px 60px; }

        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 24px; transition: all 0.15s; }
        .back-link:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 36px 32px; }

        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .card-icon { width: 44px; height: 44px; background: var(--primary-light); color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .card-title { font-size: 22px; font-weight: 800; color: var(--text); }
        .card-subtitle { font-size: 13px; color: var(--text-muted); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; color: var(--text); }
        input[type="text"], textarea {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); font-size: 14px; font-family: 'Inter', sans-serif;
            color: var(--text); outline: none; transition: border-color 0.15s; resize: vertical;
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        textarea { min-height: 110px; }

        .form-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-primary { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; background: var(--primary); color: #fff; border: none; padding: 11px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s; text-decoration: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { display: flex; align-items: center; justify-content: center; gap: 7px; background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); padding: 11px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; text-decoration: none; }
        .btn-secondary:hover { background: var(--bg); color: var(--text); }

        @media (max-width: 600px) {
            .topbar-nav { display: none; }
            .topbar { padding: 0 14px; }
            .page-wrap { padding: 0 14px 48px; margin-top: 20px; }
            .card { padding: 24px 18px; }
            .form-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/admin"><i class="bi bi-speedometer2"></i> Admin</a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </form>
</header>

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="page-wrap">

    <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="card">

        <div class="card-header">
            <div class="card-icon"><i class="bi bi-folder2-open"></i></div>
            <div>
                <div class="card-title">Edit Subject</div>
                <div class="card-subtitle">Update the subject name and description</div>
            </div>
        </div>

        <form th:action="@{/saveSubject}" th:object="${subject}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="name">Subject Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="e.g. Spring Boot, Java Core" required>
            </div>

            <div class="form-group">
                <label for="description">Description <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
                <textarea id="description" th:field="*{description}" placeholder="What topics does this subject cover?"></textarea>
            </div>

            <div class="form-actions">
                <a href="/" class="btn-secondary"><i class="bi bi-x"></i> Cancel</a>
                <button type="submit" class="btn-primary"><i class="bi bi-check-circle"></i> Update Subject</button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
