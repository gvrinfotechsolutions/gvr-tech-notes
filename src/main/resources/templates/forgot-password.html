<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-dark: #0e7a5f; --primary-light: #e6f7f2;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
            --radius: 16px; --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); width: 100%; max-width: 460px; padding: 44px 40px; }
        .brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
        .brand-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .brand-name { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
        .alert-box { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-wrap input { width: 100%; padding: 11px 14px 11px 40px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; }
        .input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }
        .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .footer-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .card { padding: 32px 22px; } }
    </style>
</head>
<body>
    <div class="card">

        <div class="brand">
            <div class="brand-icon"><i class="bi bi-journal-richtext"></i></div>
            <div class="brand-name">GVR_T_Notes</div>
        </div>

        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link</p>

        <!-- submitted message (always shown regardless of whether email exists) -->
        <div th:if="${submitted}" class="alert-box alert-success">
            <i class="bi bi-envelope-check-fill"></i>
            If that email is registered, a reset link has been sent. Check your inbox (and spam folder).
        </div>

        <form th:unless="${submitted}" th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus autocomplete="email">
                </div>
            </div>
            <button type="submit" class="btn-primary">
                <i class="bi bi-send"></i> Send Reset Link
            </button>
        </form>

        <div class="footer-link">
            <a th:href="@{/login}">Back to sign in</a>
        </div>
    </div>
</body>
</html>
