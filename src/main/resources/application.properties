spring.application.name=gvr-tech-notes
spring.main.banner-mode=off

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/gvr_tech_notes
spring.datasource.username=root
spring.datasource.password=root
server.port=8091

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# THYMELEAF
spring.thymeleaf.cache=false

# SESSION
server.servlet.session.timeout=30m

# ACTUATOR
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# SEARCH ENGINE (db = use DB, solr = use Solr)
search.engine=db

# LOGGING
logging.level.root=INFO
logging.level.com.gvr=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/gvr-notes.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Admin bootstrap credentials (override in prod via env vars)
admin.username=venky
admin.password=V@777hills

# Gemini AI — Content Generation (get free key at aistudio.google.com)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Redis and Solr — uncomment only when those services are running
