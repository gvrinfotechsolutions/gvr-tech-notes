<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Topics — GVR_T_Notes Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-light: #e6f7f2; --primary-dark: #0e7a5f;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --danger: #ef4444; --danger-light: #fef2f2;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .topbar-logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .topbar-nav { display: flex; align-items: center; gap: 4px; }
        .topbar-nav a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
        .topbar-nav a:hover { background: var(--primary-light); color: var(--primary); }
        .btn-logout { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid #fca5a5; color: #ef4444; background: #fff5f5; cursor: pointer; transition: all 0.15s; }
        .btn-logout:hover { background: #fee2e2; }

        .page-wrap { max-width: 1000px; margin: 32px auto; padding: 0 20px 60px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 22px; transition: all 0.15s; }
        .back-link:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

        .page-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .page-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

        .alert { padding: 14px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px; }
        .alert-success { background: #f0fdf4; border: 1.5px solid #86efac; color: #15803d; }
        .alert-error   { background: #fef2f2; border: 1.5px solid #fca5a5; color: #b91c1c; }

        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--primary); }

        /* SUBJECTS TABLE */
        .subject-row { background: var(--surface); border-radius: var(--radius-sm); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-left: 4px solid var(--primary); box-shadow: var(--shadow-sm); margin-bottom: 8px; }
        .subject-name { font-size: 14px; font-weight: 700; }
        .subject-count { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .subject-actions { display: flex; gap: 7px; flex-shrink: 0; }

        /* TOPICS TABLE */
        .topics-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; margin-bottom: 20px; }
        .topics-card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--primary-light); }
        .topics-card-header span { font-size: 14px; font-weight: 700; color: var(--primary-dark); }
        .topic-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; border-bottom: 1px solid #f1f5f9; gap: 10px; }
        .topic-row:last-child { border-bottom: none; }
        .topic-row:hover { background: #fafcfa; }
        .topic-title { font-size: 13px; font-weight: 600; color: var(--text); }
        .topic-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .btn-sm { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap; }
        .btn-edit   { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .btn-edit:hover { background: #fde68a; }
        .btn-delete { background: var(--danger-light); color: var(--danger); border: 1.5px solid #fecaca; }
        .btn-delete:hover { background: #fee2e2; }
        .btn-pdf    { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .btn-pdf:hover { background: #fee2e2; }
        .btn-view   { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #a7f3d0; }
        .btn-view:hover { background: #d1fae5; }

        .empty-msg { padding: 20px 18px; font-size: 13px; color: var(--text-muted); text-align: center; }

        /* SEARCH */
        .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-row input { flex: 1; padding: 9px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: var(--surface); color: var(--text); }
        .filter-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        @media (max-width: 600px) {
            .topbar-nav { display: none; }
            .page-wrap { padding: 0 14px 48px; margin-top: 20px; }
            .subject-row, .topic-row { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/admin"><i class="bi bi-speedometer2"></i> Admin</a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </form>
</header>

<div class="page-wrap">

    <a href="/admin" class="back-link"><i class="bi bi-arrow-left"></i> Back to Admin</a>

    <div class="page-title"><i class="bi bi-pencil-square"></i> Manage Topics &amp; Subjects</div>
    <p class="page-subtitle">Delete topics or subjects. Only admins can access this page.</p>

    <!-- ALERTS -->
    <div th:if="${success}" class="alert alert-success">
        <i class="bi bi-check-circle-fill" style="font-size:16px;flex-shrink:0;"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="bi bi-exclamation-circle-fill" style="font-size:16px;flex-shrink:0;"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- SUBJECTS SECTION -->
    <div style="margin-bottom:32px;">
        <div class="section-title"><i class="bi bi-folder2-open"></i> Subjects</div>

        <div th:if="${subjects.isEmpty()}" class="empty-msg">No subjects yet.</div>

        <div th:each="subject : ${subjects}" class="subject-row">
            <div>
                <div class="subject-name" th:text="${subject.name}"></div>
                <div class="subject-count">
                    <span th:text="${subjectTopicCountMap.get(subject.id)}">0</span> topic(s)
                </div>
            </div>
            <div class="subject-actions">
                <a th:href="@{/export-pdf/subject/{id}(id=${subject.id})}" class="btn-sm btn-pdf">
                    <i class="bi bi-file-earmark-pdf"></i> PDF
                </a>
                <a th:href="@{/editSubject/{id}(id=${subject.id})}" class="btn-sm btn-edit">
                    <i class="bi bi-pencil"></i> Edit
                </a>
                <a th:href="'#subject-card-' + ${subject.id}" class="btn-sm btn-view"
                   title="Jump to topic list for this subject">
                    <i class="bi bi-list-ul"></i> Topics ↓
                </a>
                <form th:action="@{/admin/deleteSubject/{id}(id=${subject.id})}" method="post" style="margin:0;"
                      onsubmit="return confirm('Delete subject &quot;' + this.dataset.name + '&quot;? This cannot be undone.')"
                      th:attr="data-name=${subject.name}">
                    <button type="submit" class="btn-sm btn-delete">
                        <i class="bi bi-trash"></i> Delete Subject
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- TOPICS BY SUBJECT -->
    <div class="section-title"><i class="bi bi-journal-text"></i> Topics by Subject</div>

    <!-- SEARCH FILTER -->
    <div class="filter-row">
        <input type="text" id="topicSearch" placeholder="Filter topics by name..." oninput="filterTopicRows(this.value)">
    </div>

    <div th:if="${subjects.isEmpty()}" class="empty-msg">No subjects or topics yet.</div>

    <div th:each="subject : ${subjects}" class="topics-card" th:id="'subject-card-' + ${subject.id}">
        <div class="topics-card-header">
            <i class="bi bi-folder-fill" style="color:var(--primary);"></i>
            <span th:text="${subject.name}"></span>
            <span style="font-size:12px;font-weight:600;color:var(--text-muted);"
                  th:text="${subjectTopicCountMap.get(subject.id)} + ' topic(s)'"></span>
            <a href="#" style="margin-left:auto;font-size:12px;color:var(--text-muted);text-decoration:none;"
               title="Back to top">↑ Back to top</a>
        </div>

        <div th:if="${#lists.isEmpty(allTopics.?[subject.id == __${subject.id}__])}" class="empty-msg">
            No topics in this subject.
        </div>

        <div th:each="topic : ${allTopics}" th:if="${topic.subject.id == subject.id}"
             class="topic-row topic-data-row" th:attr="data-title=${topic.title.toLowerCase()}">
            <div class="topic-title" th:text="${topic.title}"></div>
            <div class="topic-actions">
                <a th:href="@{/viewTopic/{id}(id=${topic.id})}" class="btn-sm btn-view">
                    <i class="bi bi-eye"></i> View
                </a>
                <a th:href="@{/editTopic/{id}(id=${topic.id})}" class="btn-sm btn-edit">
                    <i class="bi bi-pencil"></i> Edit
                </a>
                <form th:action="@{/admin/deleteTopic/{id}(id=${topic.id})}" method="post" style="margin:0;"
                      onsubmit="return confirm('Delete topic &quot;' + this.dataset.title + '&quot;? This cannot be undone.')"
                      th:attr="data-title=${topic.title}">
                    <button type="submit" class="btn-sm btn-delete">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

<script>
function filterTopicRows(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('.topic-data-row').forEach(row => {
        const title = row.getAttribute('data-title') || '';
        row.style.display = (!q || title.includes(q)) ? '' : 'none';
    });
}
</script>

</body>
</html>
