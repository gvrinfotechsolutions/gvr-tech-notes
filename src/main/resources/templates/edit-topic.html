<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Edit Topic - GVR_T_Notes</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href=
"https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body {

            background: #f8fafc;

            font-family: Arial, sans-serif;

        }

        .editor-card {

            background: white;

            border-radius: 16px;

            padding: 30px;

            box-shadow: 0 4px 14px rgba(0,0,0,0.06);

        }

        .page-title {

            font-size: 28px;

            font-weight: 700;

            color: #2d9d78;

        }

        .form-control,
        .form-select {

            border-radius: 10px;

        }

    </style>

</head>

<body>

<!-- LOGOUT -->


<div class="d-flex justify-content-end
            align-items-center
            p-3
            bg-white
            shadow-sm">

    <form th:action="@{/logout}"
          method="post">

        <button type="submit"
                class="btn btn-outline-danger
                       rounded-pill
                       px-4">

            🚪 Logout

        </button>

    </form>

</div>


<!-- BANNER -->

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="container mt-4 mb-5">

    <div class="editor-card">

        <div class="d-flex
                    justify-content-between
                    align-items-center
                    mb-4">

            <div class="page-title">

                <i class="bi bi-pencil-square"></i>

                Edit Topic

            </div>

            <a href="/"
               class="btn btn-outline-secondary">

                ← Back To Topics

            </a>

        </div>

        <form th:action="@{/saveTopic}"
              method="post"
              th:object="${topic}">

            <input type="hidden"
                   th:field="*{id}">

            <!-- SUBJECT -->

            <div class="mb-3">

                <label class="form-label">

                    Select Subject

                </label>

                <select th:field="*{subject.id}"
                        class="form-select"
                        required>

                    <option value="">
                        -- Select Subject --
                    </option>

                    <option th:each="sub : ${subjects}"
                            th:value="${sub.id}"
                            th:text="${sub.name}">

                    </option>

                </select>

            </div>

            <!-- TITLE -->

            <div class="mb-3">

                <label class="form-label">

                    Topic Title

                </label>

                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       placeholder="Enter Topic Title"
                       required>

            </div>

            <!-- CONTENT -->

            <div class="mb-3">

                <label class="form-label">

                    Topic Content

                </label>

                <textarea th:field="*{content}"
                          id="topicContent"
                          rows="20"
                          class="form-control"
                          placeholder="Write detailed technical notes here..."
                          required>

                </textarea>

            </div>

            <!-- CODE -->

            <div class="mb-3">

                <label class="form-label">

                    Code Snippet

                </label>

                <textarea th:field="*{codeSnippet}"
                          rows="8"
                          class="form-control"
                          placeholder="Write your code here...">

                </textarea>

            </div>

            <!-- TAGS -->

            <div class="mb-4">

                <label class="form-label">

                    Tags

                </label>

                <input type="text"
                       th:field="*{tags}"
                       class="form-control"
                       placeholder="Java, Spring Boot, Kafka">

            </div>

            <!-- BUTTONS -->

            <div class="d-flex gap-2">

                <button type="submit"
                        class="btn btn-success px-4">

                    Save Topic

                </button>

                <a href="/"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

<script src=
"https://cdn.ckeditor.com/4.25.1-lts/standard/ckeditor.js">
</script>

<script>

    CKEDITOR.replace('topicContent', {

        height: 500

    });

</script>
</body>
</html>
