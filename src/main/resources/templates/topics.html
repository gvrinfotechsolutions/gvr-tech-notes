<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Topics - GVR_T_Notes</title>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- BOOTSTRAP -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- ICONS -->

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: #f8fafc;
			font-family: Arial, sans-serif;
		}

		/* NAVBAR */

		.top-navbar {

			height: 60px;
			background: white;

			display: flex;
			align-items: center;
			justify-content: space-between;

			padding: 0 25px;

			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
		}

		.logo {

			font-size: 24px;
			font-weight: 700;
			color: #2d9d78;
		}

		.nav-links a {

			text-decoration: none;
			margin-left: 18px;

			color: #555;
			font-size: 14px;
			font-weight: 500;
		}

		.nav-links a:hover {

			color: #2d9d78;
		}

		/* MAIN */

		.main-container {

			display: flex;
		}

		/* SIDEBAR */

		.sidebar {

			width: 220px;
			background: white;

			min-height: 100vh;

			padding: 20px 15px;

			box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
		}

		.sidebar-title {

			font-size: 18px;
			font-weight: 700;

			color: #2d9d78;

			margin-bottom: 20px;
		}

		.subject-item {

			background: #f8f9fa;

			padding: 12px 14px;

			border-radius: 10px;

			margin-bottom: 10px;

			font-size: 14px;
			font-weight: 500;

			transition: 0.2s;
		}

		.subject-item:hover {

			background: #2d9d78;
			color: white;

			transform: translateX(4px);
		}

		/* CONTENT */

		.content-area {

			flex: 1;
			padding: 25px;
		}

		.search-card {

			background: white;

			padding: 18px;

			border-radius: 14px;

			margin-bottom: 25px;

			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
		}

		.section-title {

			font-size: 24px;
			font-weight: 700;

			margin-bottom: 20px;

			color: #2d9d78;
		}

		/* TOPICS */


		.topic-card {

			background: white;

			border-radius: 18px;

			padding: 16px 18px;

			box-shadow:
				0 4px 14px rgba(0, 0, 0, 0.05);

			transition: 0.25s ease;

			margin-bottom: 24px;
		}

		.topic-card:hover {

			transform: translateY(-3px);

			box-shadow:
				0 12px 28px rgba(0, 0, 0, 0.08);
		}

		.subject-badge {

			background: #e9f7f1;

			color: #2d9d78;

			padding: 6px 14px;

			border-radius: 20px;

			font-size: 14px;

			font-weight: 700;

			display: inline-block;
		}

		.topic-title {

			font-size: 17px;

			font-weight: 600;

			color: #222;
		}

		/* TOPIC LIST */

		.topic-list {

			margin-top: 8px;
		}

		/* EACH TOPIC */

		.topic-row {

			display: flex;

			justify-content: space-between;

			align-items: center;

			padding: 10px 8px;

			border-bottom:
				1px solid rgba(0, 0, 0, 0.06);

			transition: 0.2s ease;
		}

		.topic-row:last-child {

			border-bottom: none;
		}

		/* HOVER */

		.topic-row:hover {

			background: #f9fdfb;

			padding-left: 14px;
		}

		/* TOPIC LINK */

		.topic-link {

			text-decoration: none;

			font-size: 17px;

			font-weight: 600;

			color: #222;
		}

		.topic-link:hover {

			color: #2d9d78;
		}

		/* ACTION BUTTONS */

		.topic-actions-buttons {

			display: flex;

			align-items: center;

			gap: 8px;
		}

		/* SUBJECT CARD */

		.topic-card {

			background: white;

			border-radius: 18px;

			padding: 14px 18px;

			box-shadow:
				0 3px 10px rgba(0, 0, 0, 0.05);

			margin-bottom: 18px;

			transition: 0.2s ease;
		}

		.topic-card:hover {

			transform: translateY(-2px);

			box-shadow:
				0 8px 20px rgba(0, 0, 0, 0.08);
		}


		@media(max-width:992px) {

			.sidebar {
				display: none;
			}
		}
	</style>

</head>

<body>

	<!-- LOGOUT -->

	<div class="d-flex justify-content-end
            align-items-center
            p-3
            bg-white
            shadow-sm">

		<form th:action="@{/logout}" method="post">

			<button type="submit" class="btn btn-outline-danger rounded-pill px-4">

				🚪 Logout

			</button>

		</form>

	</div>

	<!-- LEARNING BANNER -->

	<div th:replace="fragments/banner :: learningBanner"></div>
	<!-- NAVBAR -->

	<div class="top-navbar">

		<div class="logo">

			<i class="bi bi-journal-richtext"></i>

			GVR_T_Notes

		</div>

		<div class="nav-links">

			<a href="/">

				<i class="bi bi-house"></i>

				Home

			</a>

		</div>

	</div>

	<!-- MAIN -->

	<div class="main-container">

		<!-- SIDEBAR -->

		<div class="sidebar">

			<div class="sidebar-title">

				Subjects

			</div>

			<a th:each="sub : ${subjects}" th:href="@{/subjectTopics/{id}(id=${sub.id})}"
				class="subject-item d-block text-decoration-none text-dark">

				<i class="bi bi-folder2-open"></i>

				<span th:text="${sub.name}"></span>

			</a>

			<!-- ADD TOPIC BUTTON -->

			<a th:href="@{/addTopic(subjectId=${selectedSubjectId})}"
				class="btn btn-success w-100 mt-3 rounded-pill shadow-sm">

				<i class="bi bi-plus-circle"></i>

				Add Topic

			</a>

		</div>

		<!-- CONTENT -->

		<!-- CONTENT -->

		<div class="content-area">

			<!-- SEARCH -->

			<div class="search-card">

				<form th:action="@{/searchTopics}" method="get">

					<div class="input-group">

						<input type="text" name="keyword" class="form-control" placeholder="Search Topics...">

						<button class="btn btn-success" type="submit">

							Search

						</button>

					</div>

				</form>

			</div>

			<!-- PAGE TITLE -->

			<div class="section-title">

				<i class="bi bi-folder2-open"></i>

				Learning Topics

			</div>

			<!-- TOPICS -->

			<div th:if="${groupedTopics != null
		                 and !groupedTopics.isEmpty()}">

				<!-- SUBJECT CARD -->

				<div th:each="entry : ${groupedTopics}" class="topic-card">

					<!-- SUBJECT HEADER -->

					<div class="d-flex
		                        justify-content-between
		                        align-items-center
		                        mb-3">

						<div class="subject-badge fs-6 px-3 py-2">

							<i class="bi bi-folder-fill"></i>

							<span th:text="${entry.key}">
							</span>

						</div>

						<!-- ADD TOPIC -->

						<a th:href="@{/addTopic(subjectId=${selectedSubjectId})}" class="btn btn-success
						          btn-sm
						          rounded-pill
						          px-3">

							<i class="bi bi-plus-circle"></i>

							Add Topic

						</a>

					</div>

					<!-- TOPIC LIST -->

					<!-- TOPIC LIST -->

					<div class="topic-list">

						<div th:each="topic : ${entry.value}" class="topic-row">

							<!-- LEFT -->

							<div class="topic-left">

								<a th:href="@{/viewTopic/{id}(id=${topic.id})}" class="topic-link">

									<i class="bi bi-journal-text"></i>

									<span th:text="${topic.title}">
									</span>

								</a>

							</div>

							<!-- RIGHT -->

							<div class="topic-actions-buttons">

								<!-- VIEW -->

								<a th:href="@{/viewTopic/{id}(id=${topic.id})}" class="btn btn-info btn-sm">

									<i class="bi bi-eye"></i>

								</a>

								<!-- EDIT -->

								<a th:href="@{/editTopic/{id}(id=${topic.id})}" class="btn btn-warning btn-sm">

									<i class="bi bi-pencil"></i>

								</a>

							</div>

						</div>

					</div>




				</div>



			</div>

			<div class="mb-4">

				<a href="/export-pdf" class="btn btn-danger
			              rounded-pill
			              px-4
			              shadow-sm">

					<i class="bi bi-file-earmark-pdf"></i>

					Export Full Backup PDF

				</a>

			</div>


			<!-- PAGINATION -->

			<div th:if="${currentPage != null}" class="d-flex justify-content-center mt-5 mb-3">

				<nav>

					<ul class="pagination shadow-sm">

						<!-- PREVIOUS -->

						<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">

							<a class="page-link" th:href="${selectedSubjectId != null} ?
			                   @{/subjectTopics/{id}(id=${selectedSubjectId}, page=${currentPage > 0 ? currentPage - 1 : 0})} :
			                   @{/topics(page=${currentPage - 1})}">

								Previous

							</a>

						</li>

						<!-- PAGE NUMBERS -->

						<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
							th:classappend="${currentPage == i} ? 'active'">

							<a class="page-link" th:href="${selectedSubjectId != null} ?
			                   @{/subjectTopics/{id}(id=${selectedSubjectId}, page=${i})} :
			                   @{/topics(page=${i})}" th:text="${i + 1}">
							</a>

						</li>

						<!-- NEXT -->

						<li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">

							<a class="page-link" th:href="${selectedSubjectId != null} ?
			                   @{/subjectTopics/{id}(id=${selectedSubjectId}, page=${currentPage + 1})} :
			                   @{/topics(page=${currentPage + 1})}">

								Next

							</a>

						</li>

					</ul>

				</nav>

			</div>

			<!-- EMPTY STATE -->

			<div th:if="${groupedTopics == null
		                 or groupedTopics.isEmpty()}" class="text-center mt-5">

				<h3 class="fw-bold text-secondary">

					No Topics Available Yet

				</h3>

				<p class="text-muted fs-5">

					Start building your knowledge base
					by adding your first topic.

				</p>

				<a th:href="@{/addTopic}" class="btn btn-success
		                  btn-lg
		                  rounded-pill
		                  px-4
		                  shadow-sm">

					<i class="bi bi-plus-circle"></i>

					Add Your First Topic

				</a>

			</div>
		</div>


</body>

</html>
