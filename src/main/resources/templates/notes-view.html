<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Note View — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-light: #e6f7f2; --primary-dark: #0e7a5f;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --note-bg: #fffbeb; --note-border: #fde68a;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

        /* ── TOPBAR ── */
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .topbar-logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .topbar-nav { display: flex; align-items: center; gap: 4px; }
        .topbar-nav a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
        .topbar-nav a:hover { background: var(--primary-light); color: var(--primary); }
        .btn-logout { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid #fca5a5; color: #ef4444; background: #fff5f5; cursor: pointer; transition: all 0.15s; }
        .btn-logout:hover { background: #fee2e2; }

        /* ── CONTENT ── */
        .page-wrap { max-width: 860px; margin: 32px auto; padding: 0 20px 60px; }

        .back-row { margin-bottom: 20px; }
        .btn-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); transition: all 0.15s; }
        .btn-back:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

        .topic-header { margin-bottom: 24px; }
        .topic-meta { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
        .topic-title { font-size: clamp(22px, 4vw, 32px); font-weight: 800; color: var(--text); line-height: 1.25; }
        .topic-title a { color: inherit; text-decoration: none; }
        .topic-title a:hover { color: var(--primary); }
        .topic-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 8px; }

        /* ── NOTES CARD ── */
        .notes-card { background: var(--note-bg); border: 1.5px solid var(--note-border); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
        .notes-card-header { padding: 18px 24px; border-bottom: 1.5px solid var(--note-border); background: linear-gradient(135deg, #fef9e7, #fef3c7); display: flex; align-items: center; gap: 10px; }
        .notes-card-header-icon { font-size: 20px; color: #92400e; }
        .notes-card-header-title { font-size: 16px; font-weight: 800; color: #78350f; }
        .notes-card-header-sub { font-size: 12px; color: #a16207; }
        .notes-card-body { padding: 28px 28px 36px; }

        /* ── NOTE CONTENT ── */
        .note-content { font-size: 15px; line-height: 1.9; color: #374151; word-break: break-word; }
        .note-content h1,.note-content h2,.note-content h3,.note-content h4 { font-weight: 700; color: var(--text); margin: 24px 0 10px; }
        .note-content h1 { font-size: 1.6em; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        .note-content h2 { font-size: 1.3em; }
        .note-content h3 { font-size: 1.1em; color: var(--primary-dark); }
        .note-content p { margin-bottom: 14px; }
        .note-content ul,.note-content ol { padding-left: 24px; margin-bottom: 14px; }
        .note-content li { margin-bottom: 6px; }
        .note-content blockquote { border-left: 4px solid var(--primary); background: var(--primary-light); border-radius: 0 8px 8px 0; padding: 12px 16px; margin: 16px 0; color: #1f4e3d; }
        .note-content pre { background: #0d1117; color: #e6edf3; padding: 16px 18px; border-radius: 10px; overflow-x: auto; margin: 16px 0; }
        .note-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: #f3f0ff; color: #7c3aed; padding: 2px 6px; border-radius: 4px; }
        .note-content pre code { background: transparent; color: inherit; padding: 0; font-size: 13px; }
        .note-content strong { color: var(--text); font-weight: 700; }

        /* Tables (from Quill) */
        .note-content table {
            width: 100%; border-collapse: collapse;
            margin: 16px 0 22px; font-size: 14px;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 0 1px var(--border);
        }
        .note-content table th {
            background: var(--primary); color: #fff;
            padding: 10px 14px; text-align: left;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        .note-content table td {
            padding: 9px 14px; border-bottom: 1px solid #eef2ee;
            vertical-align: top; line-height: 1.55;
        }
        .note-content table tr:last-child td { border-bottom: none; }
        .note-content table tr:nth-child(even) td { background: #f9fdfb; }
        .note-content table tr:hover td { background: #edf7f2; }

        /* Images */
        .note-content img { max-width: 100%; border-radius: var(--radius-sm); margin: 8px 0; }

        /* ── EMPTY STATE ── */
        .empty-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 56px 32px; text-align: center; }
        .empty-icon { font-size: 48px; color: var(--text-muted); opacity: 0.4; margin-bottom: 16px; }
        .empty-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
        .empty-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
        .btn-primary { display: inline-flex; align-items: center; gap: 7px; background: var(--primary); color: #fff; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: background 0.15s; }
        .btn-primary:hover { background: var(--primary-dark); }

        @media (max-width: 600px) {
            .topbar { padding: 0 14px; }
            .topbar-nav { display: none; }
            .page-wrap { padding: 0 14px 48px; margin-top: 20px; }
            .notes-card-body { padding: 20px 18px 28px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/notes"><i class="bi bi-journals"></i> Notes</a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </form>
</header>

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="page-wrap">

    <div class="back-row">
        <a href="/notes" class="btn-back"><i class="bi bi-arrow-left"></i> Back to Notes</a>
    </div>

    <!-- NOTE EXISTS -->
    <div th:if="${note != null}">

        <div class="topic-header">
            <div class="topic-meta"><i class="bi bi-journal-text"></i> Topic Note</div>
            <h1 class="topic-title">
                <a th:href="@{/viewTopic/{id}(id=${note.topic.id})}" th:text="${note.topic.title}">Topic Name</a>
            </h1>
            <p class="topic-subtitle">
                Last updated:
                <strong th:text="${#temporals.format(note.updatedDate, 'dd MMM yyyy, HH:mm')}">—</strong>
            </p>
        </div>

        <div class="notes-card">
            <div class="notes-card-header">
                <i class="bi bi-pencil-square notes-card-header-icon"></i>
                <div>
                    <div class="notes-card-header-title">My Learning Notes</div>
                    <div class="notes-card-header-sub">Personal notes captured while reading</div>
                </div>
            </div>
            <div class="notes-card-body">
                <div class="note-content" th:utext="${note.noteContent}"></div>
            </div>
        </div>

    </div>

    <!-- NO NOTES -->
    <div th:if="${note == null}" class="empty-card">
        <div class="empty-icon"><i class="bi bi-journal-x"></i></div>
        <div class="empty-title">No Notes Yet</div>
        <p class="empty-desc">Start reading a topic and capture your insights using the notes panel on the right.</p>
        <a href="/topics" class="btn-primary"><i class="bi bi-grid"></i> Browse Topics</a>
    </div>

</div>

</body>
</html>
