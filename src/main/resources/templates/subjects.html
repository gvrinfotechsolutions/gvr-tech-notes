<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Subjects — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#16a37f;--primary-light:#e6f7f2;--primary-dark:#0e7a5f;
            --bg:#f4f6f9;--surface:#fff;--border:#e5e9ef;
            --text:#1e2330;--text-muted:#6b7280;
            --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);
            --radius:14px;--radius-sm:8px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);}

        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
        .topbar-logo{font-size:18px;font-weight:800;color:var(--primary);letter-spacing:-.3px;display:flex;align-items:center;gap:8px;text-decoration:none;}
        .topbar-nav{display:flex;align-items:center;gap:4px;}
        .topbar-nav a{text-decoration:none;color:var(--text-muted);font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--radius-sm);transition:all .15s;}
        .topbar-nav a:hover{background:var(--primary-light);color:var(--primary);}
        .btn-logout{font-size:13px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);border:1.5px solid #fca5a5;color:#ef4444;background:#fff5f5;cursor:pointer;transition:all .15s;}
        .btn-logout:hover{background:#fee2e2;}

        .page-wrap{max-width:780px;margin:32px auto;padding:0 20px 60px;}

        .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);margin-bottom:22px;transition:all .15s;}
        .back-link:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary);}

        .page-header{margin-bottom:24px;}
        .page-title{font-size:26px;font-weight:800;color:var(--text);}
        .page-subtitle{font-size:14px;color:var(--text-muted);margin-top:4px;}

        .subject-list{display:flex;flex-direction:column;gap:10px;}
        .subject-row{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-left:4px solid var(--primary);transition:all .18s;}
        .subject-row:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
        .subject-row-info{min-width:0;}
        .subject-name{font-size:16px;font-weight:700;color:var(--text);}
        .subject-desc{font-size:13px;color:var(--text-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .subject-badge{display:inline-flex;align-items:center;gap:5px;background:var(--primary-light);color:var(--primary-dark);font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin-top:6px;}
        .subject-row-actions{display:flex;gap:8px;flex-shrink:0;}
        .btn-view{display:inline-flex;align-items:center;gap:5px;background:var(--primary);color:#fff;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none;transition:background .15s;white-space:nowrap;}
        .btn-view:hover{background:var(--primary-dark);}
        .btn-edit{display:inline-flex;align-items:center;gap:5px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none;transition:all .15s;white-space:nowrap;}
        .btn-edit:hover{background:#fde68a;}

        .empty{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:56px 24px;text-align:center;}
        .empty-icon{font-size:48px;color:var(--text-muted);opacity:.3;margin-bottom:16px;}
        .empty-title{font-size:20px;font-weight:700;margin-bottom:8px;}
        .empty-desc{font-size:14px;color:var(--text-muted);}

        @media(max-width:600px){
            .topbar-nav{display:none;}
            .topbar{padding:0 14px;}
            .page-wrap{padding:0 14px 48px;margin-top:20px;}
            .subject-row{flex-direction:column;align-items:flex-start;}
            .subject-row-actions{width:100%;}
            .btn-view,.btn-edit{flex:1;justify-content:center;}
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/admin"><i class="bi bi-speedometer2"></i> Admin</a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </form>
</header>

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="page-wrap">

    <a href="/admin" class="back-link"><i class="bi bi-arrow-left"></i> Admin Dashboard</a>

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-folder2-open" style="color:var(--primary)"></i> All Subjects</h1>
        <p class="page-subtitle">Browse and manage your knowledge subject categories.</p>
    </div>

    <div class="subject-list" th:if="${subjects != null and !subjects.isEmpty()}">
        <div class="subject-row" th:each="sub : ${subjects}">
            <div class="subject-row-info">
                <div class="subject-name" th:text="${sub.name}"></div>
                <div class="subject-desc"
                     th:text="${sub.description != null and !#strings.isEmpty(sub.description) ? sub.description : 'No description yet.'}">
                </div>
                <span class="subject-badge">
                    <i class="bi bi-journal-text"></i>
                    <span th:text="${subjectTopicCountMap.get(sub.id)}">0</span> topics
                </span>
            </div>
            <div class="subject-row-actions">
                <a th:href="@{/editSubject/{id}(id=${sub.id})}" class="btn-edit"><i class="bi bi-pencil"></i> Edit</a>
                <a th:href="@{/subjectTopics/{id}(id=${sub.id})}" class="btn-view"><i class="bi bi-book-open"></i> View Topics</a>
            </div>
        </div>
    </div>

    <div class="empty" th:if="${subjects == null or subjects.isEmpty()}">
        <div class="empty-icon"><i class="bi bi-folder-x"></i></div>
        <div class="empty-title">No Subjects Yet</div>
        <p class="empty-desc">Go to the home page to create your first subject.</p>
    </div>

</div>
</body>
</html>
