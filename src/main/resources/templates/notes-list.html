<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Notes — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-light: #e6f7f2; --primary-dark: #0e7a5f;
            --accent: #f59e0b; --accent-light: #fef3c7;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .topbar-logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .topbar-nav { display: flex; align-items: center; gap: 4px; }
        .topbar-nav a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
        .topbar-nav a:hover { background: var(--primary-light); color: var(--primary); }
        .btn-logout { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid #fca5a5; color: #ef4444; background: #fff5f5; cursor: pointer; }
        .btn-logout:hover { background: #fee2e2; }

        .page-wrap { max-width: 860px; margin: 32px auto; padding: 0 20px 60px; }

        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 22px; transition: all 0.15s; }
        .back-link:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

        .page-header { margin-bottom: 26px; }
        .page-title { font-size: 26px; font-weight: 800; color: var(--text); }
        .page-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

        /* STATS ROW */
        .stats-row { display: flex; gap: 14px; margin-bottom: 26px; flex-wrap: wrap; }
        .stat-card { background: var(--surface); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 14px; min-width: 180px; flex: 1; }
        .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .stat-icon-green { background: var(--primary-light); color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--text); margin-top: 2px; }

        /* NOTES LIST */
        .notes-list { display: flex; flex-direction: column; gap: 12px; }
        .note-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; gap: 16px; border-left: 4px solid var(--accent); transition: all 0.18s; }
        .note-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .note-card-info { min-width: 0; }
        .note-card-title { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 6px; }
        .note-card-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-view { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; text-decoration: none; transition: all 0.15s; }
        .btn-topic { background: var(--bg); color: var(--text-muted); border: 1.5px solid var(--border); }
        .btn-topic:hover { background: var(--surface); color: var(--text); }
        .btn-notes { background: var(--primary); color: #fff; }
        .btn-notes:hover { background: var(--primary-dark); }

        /* EMPTY */
        .empty { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 56px 24px; text-align: center; }
        .empty-icon { font-size: 48px; color: var(--text-muted); opacity: 0.35; margin-bottom: 16px; }
        .empty-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
        .empty-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
        .btn-primary { display: inline-flex; align-items: center; gap: 7px; background: var(--primary); color: #fff; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; text-decoration: none; }
        .btn-primary:hover { background: var(--primary-dark); }

        /* PAGINATION */
        .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 32px; flex-wrap: wrap; }
        .page-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 36px; height: 36px; padding: 0 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; text-decoration: none; color: var(--text-muted); background: var(--surface); border: 1.5px solid var(--border); transition: all 0.15s; }
        .page-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }

        @media (max-width: 640px) {
            .topbar-nav { display: none; }
            .topbar { padding: 0 14px; }
            .page-wrap { padding: 0 14px 48px; margin-top: 20px; }
            .note-card { flex-direction: column; align-items: flex-start; }
            .note-card-actions { width: 100%; }
            .btn-view { flex: 1; justify-content: center; }
            .stats-row { gap: 10px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/notes"><i class="bi bi-journals"></i> Notes</a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </form>
</header>

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="page-wrap">

    <a href="/topics" class="back-link"><i class="bi bi-arrow-left"></i> Back to Topics</a>

    <div class="page-header">
        <h1 class="page-title">📚 My Learning Notes</h1>
        <p class="page-subtitle">Track and revise your personal knowledge notes.</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon stat-icon-green"><i class="bi bi-journal-text"></i></div>
            <div>
                <div class="stat-label">Total Notes</div>
                <div class="stat-value" th:text="${totalNotes}">0</div>
            </div>
        </div>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(notes)}" class="empty">
        <div class="empty-icon"><i class="bi bi-journal-x"></i></div>
        <div class="empty-title">No Notes Yet</div>
        <p class="empty-desc">Open any topic and use the Notes panel on the right to capture your insights.</p>
        <a href="/topics" class="btn-primary"><i class="bi bi-grid"></i> Browse Topics</a>
    </div>

    <!-- NOTES LIST -->
    <div class="notes-list" th:if="${not #lists.isEmpty(notes)}">
        <div class="note-card" th:each="note : ${notes}">
            <div class="note-card-info">
                <div class="note-card-title" th:text="${note.topic.title}">Topic Name</div>
                <div class="note-card-meta">
                    <i class="bi bi-clock"></i>
                    Updated: <span th:text="${#temporals.format(note.updatedDate, 'dd MMM yyyy, HH:mm')}">—</span>
                </div>
            </div>
            <div class="note-card-actions">
                <a th:href="@{/viewTopic/{id}(id=${note.topic.id})}" class="btn-view btn-topic">
                    <i class="bi bi-eye"></i> Topic
                </a>
                <a th:href="@{/notes/view/{id}(id=${note.topic.id})}" class="btn-view btn-notes">
                    <i class="bi bi-journal-text"></i> Notes →
                </a>
            </div>
        </div>
    </div>

    <!-- PAGINATION -->
    <nav th:if="${notesPage.totalPages > 1}" class="pagination">
        <a class="page-btn" th:classappend="${notesPage.first} ? 'disabled'"
           th:href="@{/notes(page=${notesPage.number - 1})}"><i class="bi bi-chevron-left"></i></a>
        <a class="page-btn" th:each="i : ${#numbers.sequence(0, notesPage.totalPages - 1)}"
           th:classappend="${i == notesPage.number} ? 'active'"
           th:href="@{/notes(page=${i})}" th:text="${i + 1}"></a>
        <a class="page-btn" th:classappend="${notesPage.last} ? 'disabled'"
           th:href="@{/notes(page=${notesPage.number + 1})}"><i class="bi bi-chevron-right"></i></a>
    </nav>

</div>
</body>
</html>
