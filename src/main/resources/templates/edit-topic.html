<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Topic - GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CODEMIRROR -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/dracula.min.css">

    <style>
        body { background: #f8fafc; font-family: Arial, sans-serif; }

        .editor-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        .page-title { font-size: 26px; font-weight: 700; color: #2d9d78; }

        .form-control, .form-select { border-radius: 10px; }

        .CodeMirror {
            height: 460px;
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid #ced4da;
            font-family: Consolas, monospace;
        }

        .CodeMirror-focused { border-color: #2d9d78; box-shadow: 0 0 0 0.2rem rgba(45,157,120,.15); }

        /* Code snippet editor - smaller */
        #codeEditor .CodeMirror { height: 220px; }

        .editor-hint { font-size: 12px; color: #6c757d; margin-top: 6px; }
        .editor-hint code { background: #f1f3f5; color: #d63384; padding: 1px 5px; border-radius: 4px; }

        .preview-box {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            background: #fafafa;
            font-size: 15px;
            line-height: 1.7;
        }

        .preview-box table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        .preview-box th, .preview-box td { border: 1px solid #ddd; padding: 8px 12px; }
        .preview-box th { background: #f0f0f0; font-weight: 600; }
        .preview-box pre { background: #0d1117; color: #e6edf3; padding: 14px; border-radius: 10px; overflow: auto; }
        .preview-box code { font-family: Consolas, monospace; font-size: 13px; }
        .preview-box h1,.preview-box h2,.preview-box h3 { color: #222; font-weight: 700; margin-top: 20px; }
        .preview-box blockquote { border-left: 4px solid #2d9d78; padding-left: 14px; color: #555; margin: 14px 0; }

        .tab-btn.active { background: #2d9d78 !important; color: white !important; border-color: #2d9d78 !important; }
    </style>
</head>

<body>

<!-- LOGOUT -->
<div class="d-flex justify-content-end align-items-center p-3 bg-white shadow-sm">
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-danger rounded-pill px-4">🚪 Logout</button>
    </form>
</div>

<!-- BANNER -->
<div th:replace="fragments/banner :: learningBanner"></div>

<div class="container mt-4 mb-5">
    <div class="editor-card">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="page-title"><i class="bi bi-pencil-square"></i> Edit Topic</div>
            <a href="/" class="btn btn-outline-secondary">← Back To Topics</a>
        </div>

        <form th:action="@{/saveTopic}" method="post" th:object="${topic}">

            <input type="hidden" th:field="*{id}">

            <!-- SUBJECT -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Select Subject</label>
                <select th:field="*{subject.id}" class="form-select" required>
                    <option value="">-- Select Subject --</option>
                    <option th:each="sub : ${subjects}" th:value="${sub.id}" th:text="${sub.name}"></option>
                </select>
            </div>

            <!-- TITLE -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Topic Title</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Enter Topic Title" required>
            </div>

            <!-- TAGS -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Tags</label>
                <input type="text" th:field="*{tags}" class="form-control" placeholder="Java, Spring Boot, Kafka">
            </div>

            <!-- CONTENT EDITOR -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Topic Content (Markdown)</label>

                <div class="mb-2 d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary tab-btn active" id="writeTab" onclick="showWrite()">
                        <i class="bi bi-pencil"></i> Write
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-secondary tab-btn" id="previewTab" onclick="showPreview()">
                        <i class="bi bi-eye"></i> Preview
                    </button>
                </div>

                <div id="editorPane">
                    <!-- Hidden textarea holds the real value for form submit -->
                    <textarea th:field="*{content}" id="contentTextarea" style="display:none;" required></textarea>
                    <div id="codeMirrorWrapper"></div>
                    <div class="editor-hint">
                        Supports Markdown: <code>**bold**</code> &nbsp;
                        <code># Heading</code> &nbsp;
                        <code>```java code```</code> &nbsp;
                        <code>| table |</code>
                    </div>
                </div>

                <div id="previewPane" style="display:none;">
                    <div class="preview-box" id="previewContent">
                        <em class="text-muted">Preview will appear here...</em>
                    </div>
                </div>
            </div>

            <!-- CODE SNIPPET -->
            <div class="mb-4">
                <label class="form-label fw-semibold"><i class="bi bi-code-slash"></i> Code Snippet (Java)</label>
                <textarea th:field="*{codeSnippet}" id="codeTextarea" style="display:none;"></textarea>
                <div id="codeEditor"></div>
                <div class="editor-hint">Plain Java code — no markdown needed here, it gets syntax highlighted automatically.</div>
            </div>

            <!-- BUTTONS -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-save"></i> Save Topic
                </button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>
</div>

<!-- CODEMIRROR JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/clike/clike.min.js"></script>
<!-- MARKED for live preview -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    // ── Content editor (Markdown) ──────────────────────────────────
    var editor = CodeMirror(document.getElementById('codeMirrorWrapper'), {
        value: document.getElementById('contentTextarea').value || '',
        mode: 'markdown',
        theme: 'dracula',
        lineNumbers: true,
        lineWrapping: true,
        tabSize: 2
    });

    // ── Code snippet editor (Java) ────────────────────────────────
    var codeEditor = CodeMirror(document.getElementById('codeEditor'), {
        value: document.getElementById('codeTextarea').value || '',
        mode: 'text/x-java',
        theme: 'dracula',
        lineNumbers: true,
        lineWrapping: true,
        tabSize: 4
    });

    // Sync both editors → hidden textareas before submit
    document.querySelector('form').addEventListener('submit', function() {
        document.getElementById('contentTextarea').value = editor.getValue();
        document.getElementById('codeTextarea').value    = codeEditor.getValue();
    });

    function showWrite() {
        document.getElementById('editorPane').style.display  = 'block';
        document.getElementById('previewPane').style.display = 'none';
        document.getElementById('writeTab').classList.add('active');
        document.getElementById('previewTab').classList.remove('active');
        editor.refresh();
    }

    function showPreview() {
        var md = editor.getValue();
        document.getElementById('contentTextarea').value = md;
        document.getElementById('previewContent').innerHTML = marked.parse(md || '*Nothing to preview yet*');
        document.getElementById('editorPane').style.display  = 'none';
        document.getElementById('previewPane').style.display = 'block';
        document.getElementById('previewTab').classList.add('active');
        document.getElementById('writeTab').classList.remove('active');
    }
</script>
</body>
</html>
