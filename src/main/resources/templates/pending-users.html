<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pending Users — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-light: #e6f7f2; --primary-dark: #0e7a5f;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .topbar-logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .topbar-nav { display: flex; align-items: center; gap: 4px; }
        .topbar-nav a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
        .topbar-nav a:hover { background: var(--primary-light); color: var(--primary); }
        .btn-logout { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid #fca5a5; color: #ef4444; background: #fff5f5; cursor: pointer; transition: all 0.15s; }
        .btn-logout:hover { background: #fee2e2; }

        .page-wrap { max-width: 900px; margin: 32px auto; padding: 0 20px 60px; }

        .page-header { margin-bottom: 28px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 6px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 20px; transition: all 0.15s; }
        .back-link:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .page-title { font-size: 26px; font-weight: 800; color: var(--text); }
        .page-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

        .stat-badge { display: inline-flex; align-items: center; gap: 6px; background: #fef3c7; color: #92400e; font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 20px; border: 1px solid #fde68a; margin-top: 12px; }

        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }

        /* TABLE */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        thead { background: #f8fafc; border-bottom: 2px solid var(--border); }
        th { padding: 13px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); }
        td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafcfa; }

        .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary-light); color: var(--primary); font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .user-cell { display: flex; align-items: center; gap: 10px; }
        .user-name { font-weight: 600; color: var(--text); }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .badge-role { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #bbf7d0; }

        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-approve { display: inline-flex; align-items: center; gap: 5px; background: #16a37f; color: #fff; border: none; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s; }
        .btn-approve:hover { background: #0e7a5f; }
        .btn-reject { display: inline-flex; align-items: center; gap: 5px; background: #fff; color: #ef4444; border: 1.5px solid #fca5a5; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
        .btn-reject:hover { background: #fef2f2; }

        /* EMPTY */
        .empty { padding: 56px 24px; text-align: center; }
        .empty-icon { font-size: 44px; color: var(--text-muted); opacity: 0.35; margin-bottom: 14px; }
        .empty-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .empty-desc { font-size: 14px; color: var(--text-muted); }

        @media (max-width: 600px) {
            .topbar-nav { display: none; }
            .topbar { padding: 0 14px; }
            .page-wrap { padding: 0 14px 48px; margin-top: 20px; }
            .actions { flex-direction: column; }
            .btn-approve, .btn-reject { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/admin"><i class="bi bi-speedometer2"></i> Admin</a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </form>
</header>

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="page-wrap">

    <a href="/admin" class="back-link"><i class="bi bi-arrow-left"></i> Admin Dashboard</a>

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-person-check"></i> Pending User Requests</h1>
        <p class="page-subtitle">Review and approve or reject new account registrations.</p>
        <div class="stat-badge" th:if="${users != null and !users.isEmpty()}">
            <i class="bi bi-hourglass-split"></i>
            <span th:text="${users.size()} + ' pending'"></span>
        </div>
    </div>

    <div class="card">

        <!-- HAS USERS -->
        <div th:if="${users != null and !users.isEmpty()}" class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td style="color:var(--text-muted);font-size:13px;" th:text="${user.id}"></td>
                        <td>
                            <div class="user-cell">
                                <div class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.username,0,1))}"></div>
                                <span class="user-name" th:text="${user.username}"></span>
                            </div>
                        </td>
                        <td><span class="badge badge-role" th:text="${user.role}"></span></td>
                        <td><span class="badge badge-pending"><i class="bi bi-hourglass-split"></i> <span th:text="${user.status}"></span></span></td>
                        <td>
                            <div class="actions">
                                <form th:action="@{'/admin/approve/' + ${user.id}}" method="post" style="margin:0;">
                                    <button type="submit" class="btn-approve"><i class="bi bi-check-lg"></i> Approve</button>
                                </form>
                                <form th:action="@{'/admin/reject/' + ${user.id}}" method="post" style="margin:0;">
                                    <button type="submit" class="btn-reject"><i class="bi bi-x-lg"></i> Reject</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- EMPTY -->
        <div th:if="${users == null or users.isEmpty()}" class="empty">
            <div class="empty-icon"><i class="bi bi-person-check-fill"></i></div>
            <div class="empty-title">No Pending Requests</div>
            <p class="empty-desc">All user registrations have been reviewed. New requests will appear here.</p>
        </div>

    </div>
</div>

</body>
</html>
