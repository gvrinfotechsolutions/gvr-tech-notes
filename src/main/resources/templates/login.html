<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Login - GVR_T_Notes</title>

	<meta charset="UTF-8">

	<meta name="viewport"
	      content="width=device-width, initial-scale=1">

	<!-- BOOTSTRAP -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	      rel="stylesheet">

	<style>

		body {

			background: linear-gradient(to right,
			            #f8fafc,
			            #e2e8f0);

			font-family: Arial, sans-serif;

			min-height: 100vh;
		}

		.login-container {

			max-width: 450px;

			margin: 60px auto;

			background: white;

			padding: 40px;

			border-radius: 20px;

			box-shadow: 0 6px 18px rgba(0,0,0,0.08);
		}

		.page-title {

			text-align: center;

			color: #2d9d78;

			font-weight: 700;

			margin-bottom: 30px;
		}

		.form-label {

			font-weight: 600;

			color: #444;
		}

		.form-control {

			border-radius: 10px;

			padding: 12px;
		}

		.btn-login {

			width: 100%;

			padding: 12px;

			border-radius: 10px;

			font-size: 16px;

			font-weight: 600;
		}

		.register-link {

			text-align: center;

			margin-top: 20px;
		}

		.register-link a {

			text-decoration: none;

			color: #2d9d78;

			font-weight: 600;
		}

		.register-link a:hover {

			text-decoration: underline;
		}

	</style>

</head>

<body>

	<!-- LEARNING BANNER -->

	<div th:replace="fragments/banner :: learningBanner"></div>

	<div class="container">

		<div class="login-container">

			<h2 class="page-title">

				Welcome Back 👋

			</h2>

			<form th:action="@{/login}"
			      method="post">

				<!-- USERNAME -->

				<div class="mb-3">

					<label class="form-label">

						Username

					</label>

					<input type="text"
					       name="username"
					       class="form-control"
					       placeholder="Enter username"
					       required>

				</div>

				<!-- PASSWORD -->

				<div class="mb-4">

					<label class="form-label">

						Password

					</label>

					<input type="password"
					       name="password"
					       class="form-control"
					       placeholder="Enter password"
					       required>

				</div>

				<!-- LOGIN BUTTON -->

				<button type="submit"
				        class="btn btn-success btn-login">

					Login

				</button>

			</form>

			<!-- REGISTER LINK -->

			<div class="register-link">

				New User?

				<a th:href="@{/register}">

					Create Account

				</a>

			</div>

		</div>

	</div>

</body>

</html>
