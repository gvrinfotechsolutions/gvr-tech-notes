<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Search Results</title>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

	<style>
		body {
			background: #f5f7fa;
			font-family: 'Segoe UI', sans-serif;
		}

		.header-card {
			background: white;
			border-radius: 15px;
			padding: 30px;
			box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
			margin-bottom: 25px;
		}

		.header-title {
			font-size: 32px;
			font-weight: 700;
			color: #1f2937;
		}

		.search-keyword {
			color: #2563eb;
			font-weight: 600;
		}

		.stats-box {
			display: flex;
			gap: 15px;
			margin-top: 20px;
			flex-wrap: wrap;
		}

		.stat-item {
			background: #f8fafc;
			border: 1px solid #e5e7eb;
			padding: 10px 15px;
			border-radius: 10px;
			font-size: 14px;
		}

		.search-bar {
			background: white;
			padding: 20px;
			border-radius: 15px;
			box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
			margin-bottom: 30px;
		}

		.topic-card {
			border: none;
			border-radius: 15px;
			box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
			transition: .25s;
		}

		.topic-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 10px 25px rgba(0, 0, 0, .12);
		}

		.topic-title {
			font-size: 26px;
			font-weight: 600;
			color: #1f2937;
		}

		.topic-content {
			color: #64748b;
			line-height: 1.8;
			margin-top: 15px;
		}

		.subject-badge {
			font-size: 13px;
			padding: 8px 14px;
			border-radius: 20px;
		}

		.topic-footer {
			border-top: 1px solid #e5e7eb;
			margin-top: 20px;
			padding-top: 15px;
		}

		.pagination .page-link {
			border-radius: 8px;
			margin: 0 3px;
		}

		.footer {
			margin-top: 50px;
			text-align: center;
			color: #94a3b8;
		}

		.empty-box {
			background: white;
			padding: 50px;
			border-radius: 15px;
			text-align: center;
			box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
		}
	</style>

</head>

<body>

	<div class="container py-5">

		<!-- HEADER -->

		<div class="header-card">

			<h1 class="header-title">
				<i class="fa-solid fa-magnifying-glass"></i>
				Search Results
			</h1>

			<p class="mt-2 text-muted">

			    Found

			    <strong th:text="${totalResults}">0</strong>

			    result(s) for

			    "<span class="search-keyword"
			           th:text="${keyword}">
			    </span>"

			</p>

			<div class="stats-box">

				<div class="stat-item">
					📚 Topics:
					<strong th:text="${topics.size()}"></strong>
				</div>

				<div class="stat-item">
					🔍 Search:
					<strong th:text="${keyword}"></strong>
				</div>

			</div>

		</div>

		<!-- SEARCH BAR -->

		<div class="search-bar">

			<form action="/searchTopics" method="get">

				<div class="input-group">

					<input type="text" name="keyword" class="form-control"
						placeholder="Search topics, notes, keywords...">

					<button class="btn btn-primary">

						<i class="fa-solid fa-search"></i>

					</button>

				</div>

			</form>

		</div>

		<!-- NO RESULTS -->

		<div th:if="${#lists.isEmpty(topics)}">

			<div class="empty-box">

				<h3>No Topics Found</h3>

				<p class="text-muted">
					Try another keyword.
				</p>

			</div>

		</div>

		<!-- RESULTS -->

		<div th:each="topic : ${topics}" class="card topic-card mb-4">

			<div class="card-body">

				<div class="d-flex justify-content-between align-items-center">

					<span class="badge bg-success subject-badge" th:text="${topic.subject.name}">
					</span>

					<small class="text-muted">

						<i class="fa-solid fa-book"></i>

						Knowledge Article

					</small>

				</div>

				<h3 class="topic-title mt-3" th:text="${topic.title}">
				</h3>

				<!-- TAGS -->

				<div class="mt-2" th:if="${topic.tags != null and !#strings.isEmpty(topic.tags)}">

					<span class="badge bg-light text-dark border me-1"
						th:each="tag : ${#strings.arraySplit(topic.tags, ',')}" th:text="${#strings.trim(tag)}">
					</span>

				</div>

				<div class="topic-footer">

					<a th:href="@{/viewTopic/{id}(id=${topic.id})}" class="btn btn-primary btn-sm">

						<i class="fa-solid fa-eye"></i>
						View Topic

					</a>

				</div>

			</div>

		</div>

	</div>

	<!-- PAGINATION -->


	<div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-5">

		<nav>

			<ul class="pagination shadow-sm">

				<!-- PREVIOUS -->

				<li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">

					<a class="page-link" th:href="@{/searchTopics(
	                                keyword=${keyword},
	                                page=${currentPage-1},
	                                size=${size})}">

						Previous

					</a>

				</li>

				<!-- PAGE NUMBERS -->

				<li class="page-item" th:each="i : ${#numbers.sequence(0,totalPages-1)}"
					th:classappend="${i == currentPage ? 'active' : ''}">

					<a class="page-link" th:text="${i+1}" th:href="@{/searchTopics(
	                                keyword=${keyword},
	                                page=${i},
	                                size=${size})}">
					</a>

				</li>

				<!-- NEXT -->

				<li class="page-item" th:classappend="${currentPage == totalPages-1 ? 'disabled' : ''}">

					<a class="page-link" th:href="@{/searchTopics(
	                                keyword=${keyword},
	                                page=${currentPage+1},
	                                size=${size})}">

						Next

					</a>

				</li>

			</ul>

		</nav>

	</div>
	<!-- BACK BUTTON -->

	<div class="text-center mt-4">

		<a href="/topics" class="btn btn-secondary">

			← Back To Topics

		</a>

	</div>

	<!-- FOOTER -->

	<div class="footer">
		<hr>

		<p>
			GVR Tech Notes • Knowledge Management System
		</p>

	</div>

	</div>

</body>

</html>
