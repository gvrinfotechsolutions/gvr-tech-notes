<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Topic - GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f7fb; font-family: Arial, sans-serif; }
        .form-container {
            max-width: 800px; margin: 40px auto; background: white;
            padding: 35px; border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.07);
        }
        .page-title { color: #2d9d78; font-weight: 700; margin-bottom: 25px; }
        .form-control, .form-select { border-radius: 10px; }
        .markdown-hint {
            font-size: 12px; color: #6c757d; margin-top: 6px;
            background: #f8f9fa; padding: 8px 12px; border-radius: 8px;
        }
        .markdown-hint code { background: #e9ecef; padding: 1px 5px; border-radius: 4px; color: #d63384; }
    </style>
</head>
<body>

    <div th:replace="fragments/banner :: learningBanner"></div>

    <div class="container">
        <div class="form-container">

            <h2 class="page-title">
                <i class="bi bi-plus-circle"></i> Add New Topic
            </h2>

            <form th:action="@{/saveTopic}" th:object="${topic}" method="post">

                <!-- SUBJECT -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Subject</label>
                    <select th:field="*{subject.id}" class="form-select" required>
                        <option value="">-- Select Subject --</option>
                        <option th:each="sub : ${subjects}"
                                th:value="${sub.id}"
                                th:text="${sub.name + ' (' + subjectTopicCountMap.get(sub.id) + ')'}">
                        </option>
                    </select>
                </div>

                <!-- TITLE -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Topic Title</label>
                    <input type="text" th:field="*{title}" class="form-control"
                           placeholder="e.g. Java 8 Streams" required>
                </div>

                <!-- TAGS -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Tags</label>
                    <input type="text" th:field="*{tags}" class="form-control"
                           placeholder="Java, Streams, Lambda">
                    <div class="markdown-hint">Comma-separated tags for filtering.</div>
                </div>

                <!-- CONTENT -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Content (Markdown)</label>
                    <textarea th:field="*{content}" id="topicContent" rows="18"
                              class="form-control" required
                              placeholder="Paste Claude's markdown content here..."></textarea>
                    <div class="markdown-hint">
                        Supports Markdown: <code>**bold**</code>, <code>## heading</code>,
                        <code>```java code```</code>, <code>| tables |</code>, bullet lists and more.
                    </div>
                </div>

                <!-- CODE SNIPPET -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Code Snippet <span class="text-muted fw-normal">(optional — for highlighted Java code block)</span>
                    </label>
                    <textarea th:field="*{codeSnippet}" rows="8" class="form-control"
                              placeholder="public class Example { ... }"></textarea>
                </div>

                <!-- BUTTONS -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-circle"></i> Save Topic
                    </button>
                    <a href="/topics" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.ckeditor.com/4.25.1-lts/standard/ckeditor.js"></script>
    <script>
        CKEDITOR.replace('topicContent', { height: 500 });
    </script>
</body>
</html>
