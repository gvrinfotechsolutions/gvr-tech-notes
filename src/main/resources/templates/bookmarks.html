<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookmarks — GVR_T_Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a37f; --primary-light: #e6f7f2; --primary-dark: #0e7a5f;
            --accent: #f59e0b; --accent-light: #fef3c7;
            --bg: #f4f6f9; --surface: #fff; --border: #e5e9ef;
            --text: #1e2330; --text-muted: #6b7280;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .topbar-logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .topbar-nav { display: flex; align-items: center; gap: 4px; }
        .topbar-nav a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
        .topbar-nav a:hover, .topbar-nav a.active { background: var(--primary-light); color: var(--primary); font-weight: 700; }
        .btn-dark-toggle { font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); color: var(--text-muted); background: var(--bg); cursor: pointer; }
        .btn-logout { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid #fca5a5; color: #ef4444; background: #fff5f5; cursor: pointer; }
        .btn-logout:hover { background: #fee2e2; }

        .page-wrap { max-width: 860px; margin: 28px auto; padding: 0 20px 60px; }

        /* HERO */
        .hero { background: linear-gradient(135deg, #c2410c, #ea580c); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 24px; color: #fff; display: flex; align-items: center; gap: 18px; box-shadow: var(--shadow-md); }
        .hero-icon { font-size: 42px; flex-shrink: 0; }
        .hero-title { font-size: 22px; font-weight: 800; }
        .hero-sub { font-size: 13px; opacity: 0.88; margin-top: 4px; }
        .hero-count { background: rgba(255,255,255,0.2); padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 8px; display: inline-block; }

        /* BOOKMARK LIST */
        .bm-list { display: flex; flex-direction: column; gap: 10px; }
        .bm-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; border-left: 4px solid #f97316; transition: all 0.18s; }
        .bm-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
        .bm-info { min-width: 0; flex: 1; }
        .bm-subject { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--primary); margin-bottom: 4px; }
        .bm-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
        .bm-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .bm-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #f5f3ff; color: #5b21b6; border: 1px solid #ddd6fe; }
        .diff-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
        .diff-easy   { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .diff-medium { background: #fef9c3; color: #a16207; border: 1px solid #fde68a; }
        .diff-hard   { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .bm-date { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .bm-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-view { display: inline-flex; align-items: center; gap: 5px; background: var(--primary); color: #fff; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
        .btn-view:hover { background: var(--primary-dark); }
        .btn-flashcard { display: inline-flex; align-items: center; gap: 5px; background: #eff6ff; color: #2563eb; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.15s; border: 1px solid #bfdbfe; }
        .btn-flashcard:hover { background: #dbeafe; }
        .btn-remove { display: inline-flex; align-items: center; gap: 5px; background: #fff5f5; color: #ef4444; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: 1px solid #fecaca; cursor: pointer; transition: all 0.15s; }
        .btn-remove:hover { background: #fee2e2; }

        /* EMPTY */
        .empty { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 64px 24px; text-align: center; }
        .empty-icon { font-size: 56px; color: var(--text-muted); opacity: 0.25; margin-bottom: 16px; }
        .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        .btn-go { display: inline-flex; align-items: center; gap: 7px; background: var(--primary); color: #fff; padding: 10px 22px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; text-decoration: none; }
        .btn-go:hover { background: var(--primary-dark); }

        /* DARK MODE */
        .dark body { background: #111827; color: #f3f4f6; }
        .dark .topbar { background: #1f2937; border-color: #374151; }
        .dark .topbar-logo { color: #34d399; }
        .dark .topbar-nav a { color: #9ca3af; }
        .dark .hero { background: linear-gradient(135deg, #7c2d12, #9a3412); }
        .dark .bm-card { background: #1f2937; border-color: #374151; border-left-color: #f97316; }
        .dark .bm-title { color: #e5e7eb; }
        .dark .empty { background: #1f2937; border-color: #374151; }
        .dark .empty-title { color: #e5e7eb; }

        @media (max-width: 600px) {
            .topbar-nav { display: none; }
            .bm-card { flex-direction: column; align-items: flex-start; }
            .bm-actions { width: 100%; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="topbar-logo"><i class="bi bi-journal-richtext"></i> GVR_T_Notes</a>
    <nav class="topbar-nav">
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <a href="/topics"><i class="bi bi-grid"></i> Topics</a>
        <a href="/bookmarks" class="active"><i class="bi bi-bookmark-heart"></i> Bookmarks</a>
    </nav>
    <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn-dark-toggle" id="darkToggle" onclick="toggleDark()">🌙 <span>Dark</span></button>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </div>
</header>

<div th:replace="fragments/banner :: learningBanner"></div>

<div class="page-wrap">

    <!-- HERO -->
    <div class="hero">
        <div class="hero-icon">🔖</div>
        <div>
            <div class="hero-title">My Bookmarks</div>
            <div class="hero-sub">Topics you've saved for quick access</div>
            <div class="hero-count" th:text="${#lists.size(bookmarks)} + ' bookmarked topics'">0 bookmarked topics</div>
        </div>
    </div>

    <!-- BOOKMARK LIST -->
    <div class="bm-list" th:if="${bookmarks != null and !bookmarks.isEmpty()}">
        <div class="bm-card" th:each="bm : ${bookmarks}" th:id="'bm-card-' + ${bm.id}">
            <div class="bm-info">
                <div class="bm-subject" th:text="${bm.topic.subject.name}"></div>
                <div class="bm-title" th:text="${bm.topic.title}"></div>
                <div class="bm-meta">
                    <!-- difficulty badge -->
                    <span th:if="${bm.topic.difficulty != null}"
                          th:classappend="${bm.topic.difficulty.name() == 'EASY'} ? 'diff-easy' : (${bm.topic.difficulty.name() == 'MEDIUM'} ? 'diff-medium' : 'diff-hard')"
                          class="diff-badge"
                          th:text="${bm.topic.difficulty.name() == 'EASY'} ? '🟢 Easy' : (${bm.topic.difficulty.name() == 'MEDIUM'} ? '🟡 Medium' : '🔴 Hard')">
                    </span>
                    <!-- tags -->
                    <span th:each="tag : ${#strings.arraySplit(bm.topic.tags != null ? bm.topic.tags : '', ',')}"
                          th:if="${!#strings.isEmpty(#strings.trim(tag))}"
                          th:text="${#strings.trim(tag)}"
                          class="bm-tag"></span>
                    <!-- bookmarked date -->
                    <span class="bm-date">
                        <i class="bi bi-bookmark-fill" style="color:#f97316;"></i>
                        <span th:text="${#temporals.format(bm.bookmarkedAt, 'dd MMM yyyy')}"></span>
                    </span>
                </div>
            </div>
            <div class="bm-actions">
                <a th:href="@{/flashcards/{id}(id=${bm.topic.id})}" class="btn-flashcard">
                    <i class="bi bi-card-list"></i> Flashcards
                </a>
                <a th:href="@{/viewTopic/{id}(id=${bm.topic.id})}" class="btn-view">
                    <i class="bi bi-eye"></i> View
                </a>
                <button class="btn-remove"
                        th:attr="data-id=${bm.topic.id}, data-card-id=${'bm-card-' + bm.id}"
                        onclick="removeBookmark(this)">
                    <i class="bi bi-bookmark-x"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty" th:if="${bookmarks == null or bookmarks.isEmpty()}">
        <div class="empty-icon"><i class="bi bi-bookmark"></i></div>
        <div class="empty-title">No Bookmarks Yet</div>
        <p class="empty-desc">Bookmark topics from the Topics page to see them here.</p>
        <a href="/topics" class="btn-go"><i class="bi bi-grid"></i> Browse Topics</a>
    </div>

</div>

<script>
    function toggleDark() {
        document.documentElement.classList.toggle('dark');
        const on = document.documentElement.classList.contains('dark');
        localStorage.setItem('darkMode', on);
        document.getElementById('darkToggle').innerHTML = on ? '☀️ <span>Light</span>' : '🌙 <span>Dark</span>';
    }
    if (localStorage.getItem('darkMode') === 'true') {
        document.documentElement.classList.add('dark');
        document.getElementById('darkToggle').innerHTML = '☀️ <span>Light</span>';
    }

    function removeBookmark(btn) {
        const topicId = btn.getAttribute('data-id');
        const cardId  = btn.getAttribute('data-card-id');
        fetch('/bookmarks/toggle/' + topicId, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (!data.bookmarked) {
                    const card = document.getElementById(cardId);
                    if (card) { card.style.transition = 'opacity 0.3s'; card.style.opacity = '0'; setTimeout(() => card.remove(), 300); }
                }
            });
    }
</script>
</body>
</html>
