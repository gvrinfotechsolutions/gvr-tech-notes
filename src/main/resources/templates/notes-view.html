<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<!DOCTYPE html>

	<html xmlns:th="http://www.thymeleaf.org">

	<head>

	
	<title>My Notes - GVR Notes</title>

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>

	    body {
	        background: #f8fafc;
	        font-family: "Segoe UI", sans-serif;
	    }

	    .page-container {
	        max-width: 950px;
	    }

	    .back-btn {
	        margin-bottom: 20px;
	    }

	    .topic-header {
	        margin-bottom: 25px;
	    }

	    .topic-title {
	        font-size: 2.3rem;
	        font-weight: 700;
	        color: #212529;
	        margin-bottom: 8px;
	    }

	    .topic-title a {
	        text-decoration: none;
	        color: inherit;
	    }

	    .topic-title a:hover {
	        color: #198754;
	    }

	    .topic-subtitle {
	        color: #6c757d;
	        font-size: 1rem;
	        margin-bottom: 0;
	    }

	    .notes-card {

	        background: #fff;

	        border: none;

	        border-radius: 20px;

	        padding: 30px;

	        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
	    }

	    .notes-section-title {

	        font-size: 1.3rem;

	        font-weight: 700;

	        color: #198754;

	        margin-bottom: 20px;

	        padding-bottom: 12px;

	        border-bottom: 1px solid #e9ecef;
	    }

	    .note-content {

	        font-size: 1.05rem;

	        line-height: 1.9;

	        color: #343a40;

	        word-break: break-word;
	    }

	    .note-content h1,
	    .note-content h2,
	    .note-content h3,
	    .note-content h4 {

	        margin-top: 30px;

	        margin-bottom: 15px;

	        font-weight: 700;

	        color: #212529;
	    }

	    .note-content p {
	        margin-bottom: 16px;
	    }

	    .note-content ul,
	    .note-content ol {

	        margin-bottom: 16px;

	        padding-left: 24px;
	    }

	    .note-content li {
	        margin-bottom: 8px;
	    }

	    .note-content blockquote {

	        border-left: 4px solid #198754;

	        padding-left: 15px;

	        color: #6c757d;

	        margin: 20px 0;
	    }

	    .note-content pre {

	        background: #0d1117;

	        color: white;

	        padding: 18px;

	        border-radius: 12px;

	        overflow-x: auto;

	        margin: 20px 0;
	    }

	    .note-content code {

	        font-family: Consolas, monospace;
	    }

	    .empty-state {

	        background: white;

	        border-radius: 20px;

	        padding: 50px 30px;

	        text-align: center;

	        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
	    }

	    .empty-state h4 {

	        margin-bottom: 15px;
	    }

	    .empty-state p {

	        color: #6c757d;

	        margin-bottom: 20px;
	    }

	    @media (max-width: 768px) {

	        .page-container {
	            padding-left: 12px;
	            padding-right: 12px;
	        }

	        .topic-title {
	            font-size: 1.8rem;
	        }

	        .notes-card {
	            padding: 20px;
	            border-radius: 16px;
	        }

	        .notes-section-title {
	            font-size: 1.1rem;
	        }

	        .note-content {
	            font-size: 1rem;
	            line-height: 1.8;
	        }

	        .back-btn {
	            width: 100%;
	        }

	        .note-content pre {
	            font-size: 0.9rem;
	        }
	    }

	</style>
	```

	</head>

	<body>

	<div class="container page-container mt-4">

	```
	<a href="/notes"
	   class="btn btn-outline-secondary back-btn">

	    ← Back To Notes

	</a>

	<div th:if="${note != null}">

	    <div class="topic-header">

	        <h1 class="topic-title">

	            <a th:href="@{/viewTopic/{id}(id=${note.topic.id})}">

	                <span th:text="${note.topic.title}">
	                    Topic Name
	                </span>

	            </a>

	        </h1>

	        <p class="topic-subtitle">

	            Review and revise your notes anytime.

	        </p>

	    </div>

	    <div class="notes-card">

	        <div class="notes-section-title">

	            📚 My Learning Notes

	        </div>

	        <div class="note-content"
	             th:utext="${note.noteContent}">
	        </div>

	    </div>

	</div>

	<div th:if="${note == null}"
	     class="empty-state">

	    <h4>

	        No Notes Available Yet

	    </h4>

	    <p>

	        Start preparing notes from the topic page and they will appear here.

	    </p>

	    <a href="/topics"
	       class="btn btn-primary">

	        Go To Topics

	    </a>

	</div>
	

	</div>

	</body>

	</html>

	</div>

</body>

</html>
